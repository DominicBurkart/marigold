name: onboarding

on: [push]

env:
  CARGO_TERM_COLOR: always

jobs:
  onboarding:
    name: Onboarding
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - run: cargo install --path marigold -F cli
    - run: marigold run examples/integers.marigold
    - run: marigold analyze examples/integers.marigold
    - run: |
        marigold analyze examples/integers.marigold > /tmp/analyze_output.json
        python3 -c "
        import json, sys
        with open('/tmp/analyze_output.json') as f:
            data = json.load(f)
        assert 'streams' in data
        assert 'program_time' in data
        assert 'program_space' in data
        assert len(data['streams']) == 1
        print('Analyze output validated successfully')
        "
    - run: shellcheck install.sh
