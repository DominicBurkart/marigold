[advisories]
ignore = [
    # proc-macro-error unmaintained — used only by internal macros
    "RUSTSEC-2024-0370",
    # rand unsound with custom logger using thread_rng — not applicable (no custom logger)
    "RUSTSEC-2026-0097",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
]

[[licenses.exceptions]]
allow = ["LicenseRef-ring"]
name = "ring"

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
