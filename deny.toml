[advisories]
ignore = [
    # serde_cbor unmaintained — used only by criterion (dev dep)
    "RUSTSEC-2021-0127",
    # atty unmaintained — used only by criterion (dev dep)
    "RUSTSEC-2021-0145",
    # proc-macro-error unmaintained — used only by internal macros
    "RUSTSEC-2024-0370",
    # atty unsound potential unaligned read — dev dep only
    "RUSTSEC-2024-0375",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
]

[[licenses.exceptions]]
allow = ["LicenseRef-ring"]
name = "ring"

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
